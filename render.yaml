services:
  # Mini App server (HTTPS + scheduler)
  - type: web
    name: tickets-bot-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BOT_TOKEN
        sync: false          # Render dashboard da qo'lda kiriting
      - key: WEBAPP_URL
        sync: false          # Bu servisning URL i (deploy bo'lgach ko'rinadi)

  # Telegram bot (polling)
  - type: worker
    name: tickets-bot-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false

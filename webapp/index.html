<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Chipta Qidiruv</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <h1 class="header-title" id="headerTitle">🚆 Chipta Qidirish</h1>
    <button class="bell-btn" id="bellBtn" onclick="goToSubscriptions()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="bell-badge" id="bellBadge" style="display:none"></span>
    </button>
  </header>

  <!-- ===== MAIN SCREEN ===== -->
  <div class="screen active" id="screenMain">
    <div class="hero">
      <div class="hero-icon">🚄</div>
      <p class="hero-subtitle">O'zbekiston temir yo'llari</p>
    </div>

    <div class="search-card">
      <div class="field-group">
        <div class="field" id="fieldFrom" onclick="openStationPicker('from')">
          <div class="field-icon from-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="12" r="3" fill="currentColor"/>
            </svg>
          </div>
          <div class="field-content">
            <span class="field-label">Qayerdan</span>
            <span class="field-value" id="fromValue">Stansiya tanlang</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>

        <div class="field-divider">
          <div class="divider-line"></div>
          <button class="swap-btn" onclick="swapStations()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M7 16V4M7 4L3 8M7 4L11 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17 8V20M17 20L21 16M17 20L13 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="divider-line"></div>
        </div>

        <div class="field" id="fieldTo" onclick="openStationPicker('to')">
          <div class="field-icon to-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" stroke="currentColor" stroke-width="2"/>
              <circle cx="12" cy="9" r="2.5" fill="currentColor"/>
            </svg>
          </div>
          <div class="field-content">
            <span class="field-label">Qayerga</span>
            <span class="field-value" id="toValue">Stansiya tanlang</span>
          </div>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="field" id="fieldDate" onclick="openDatePicker()">
        <div class="field-icon date-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M16 2V6M8 2V6M3 10H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="field-content">
          <span class="field-label">Sana</span>
          <span class="field-value" id="dateValue">Sana tanlang</span>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <button class="search-btn" id="searchBtn" onclick="doSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
          <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Qidirish
      </button>
    </div>
  </div>

  <!-- ===== STATION PICKER ===== -->
  <div class="screen" id="screenStation">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" class="search-icon">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="stationSearch" placeholder="Stansiya qidirish..." oninput="filterStations()" autocomplete="off" />
    </div>
    <div class="station-list" id="stationList"></div>
  </div>

  <!-- ===== DATE PICKER ===== -->
  <div class="screen" id="screenDate">
    <div class="date-grid" id="dateGrid"></div>
  </div>

  <!-- ===== RESULTS SCREEN ===== -->
  <div class="screen" id="screenResults">
    <div class="results-header" id="resultsHeader"></div>
    <div class="trains-list" id="trainsList"></div>
  </div>

  <!-- ===== SUBSCRIPTIONS SCREEN ===== -->
  <div class="screen" id="screenSubscriptions">
    <div class="subs-list" id="subsList"></div>
  </div>

  <!-- ===== LOADING OVERLAY ===== -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader">
      <div class="train-loader">🚄</div>
      <p id="loadingText">Poyezdlar qidirilmoqda...</p>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
